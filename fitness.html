<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>FitLog - フィットネス記録</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12131a;
      --surface2: #1a1b26;
      --border: #2a2b3d;
      --primary: #6366f1;
      --primary-light: #818cf8;
      --green: #10b981;
      --amber: #f59e0b;
      --blue: #3b82f6;
      --pink: #ec4899;
      --red: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
    }

    /* ── ヘッダー ── */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .app-header h1 {
      font-size: 1.25rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--primary-light), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.02em;
    }
    .app-header .today {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: right;
    }

    /* ── タブナビ ── */
    .tab-nav {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
      position: sticky;
      top: 53px;
      z-index: 99;
    }
    .tab-nav::-webkit-scrollbar { display: none; }
    .tab-btn {
      flex: 1;
      min-width: 75px;
      padding: 10px 6px 8px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.72rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      transition: all 0.2s;
      font-family: inherit;
      white-space: nowrap;
    }
    .tab-btn .icon { font-size: 1.1rem; }
    .tab-btn.active { color: var(--primary-light); border-bottom-color: var(--primary); }

    /* ── パネル ── */
    .tab-panel { display: none; padding: 16px; max-width: 820px; margin: 0 auto; }
    .tab-panel.active { display: block; }

    /* ── カード ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
    }
    .card-title {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 14px;
    }

    /* ── フォーム ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .form-grid.col3 { grid-template-columns: 1fr 1fr 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
    input, select, textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 11px;
      color: var(--text);
      font-size: 0.88rem;
      width: 100%;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    input:focus, select:focus { outline: none; border-color: var(--primary); }
    select option { background: var(--surface2); }
    .auto-display {
      border-radius: 8px;
      padding: 9px 11px;
      font-size: 0.88rem;
      font-weight: 700;
      min-height: 38px;
      background: var(--surface2);
      border: 1px solid var(--border);
    }

    /* ── ボタン ── */
    .btn-submit {
      width: 100%;
      padding: 11px;
      margin-top: 10px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      color: white;
      transition: opacity 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .btn-submit:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-del {
      padding: 3px 10px;
      border-radius: 6px;
      border: 1px solid var(--red);
      background: none;
      color: var(--red);
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-del:hover { background: var(--red); color: white; }

    /* ── 記録リスト ── */
    .record-list { max-height: 320px; overflow-y: auto; }
    .rec {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      gap: 8px;
    }
    .rec:last-child { border-bottom: none; }
    .rec-date { font-size: 0.72rem; color: var(--muted); margin-bottom: 3px; }
    .rec-main { font-size: 0.93rem; font-weight: 700; }
    .rec-sub { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .badge {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 700;
    }
    .bg-g { background: rgba(16,185,129,.15); color: var(--green); }
    .bg-a { background: rgba(245,158,11,.15); color: var(--amber); }
    .bg-b { background: rgba(59,130,246,.15); color: var(--blue); }

    /* ── サマリーカード ── */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat-box {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 10px;
      text-align: center;
    }
    .stat-val { font-size: 1.35rem; font-weight: 800; margin-bottom: 3px; }
    .stat-lbl { font-size: 0.7rem; color: var(--muted); }

    /* ── グラフ ── */
    .chart-wrap { position: relative; height: 210px; margin-bottom: 4px; }

    /* ── サブタブ ── */
    .sub-nav {
      display: flex;
      gap: 7px;
      margin-bottom: 14px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .sub-nav::-webkit-scrollbar { display: none; }
    .sub-btn {
      padding: 7px 15px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.82rem;
      white-space: nowrap;
      transition: all 0.2s;
      font-family: inherit;
    }
    .sub-btn.active { background: var(--primary); border-color: var(--primary); color: white; }
    .sub-panel { display: none; }
    .sub-panel.active { display: block; }

    /* ── テーブル ── */
    .tbl-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      text-align: left;
      padding: 7px 10px;
      color: var(--muted);
      font-weight: 500;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td { padding: 9px 10px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }

    /* ── 空ステート ── */
    .empty {
      text-align: center;
      padding: 32px 20px;
      color: var(--muted);
    }
    .empty .ei { font-size: 1.8rem; margin-bottom: 6px; }
    .empty p { font-size: 0.82rem; }

    /* ── トースト ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 22px;
      border-radius: 24px;
      font-size: 0.85rem;
      transition: transform 0.3s ease;
      z-index: 999;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* ── 色 ── */
    .c-g { color: var(--green); }
    .c-a { color: var(--amber); }
    .c-b { color: var(--blue); }
    .c-p { color: var(--primary-light); }

    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-grid.col3 { grid-template-columns: 1fr 1fr 1fr; }
      .stat-row { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

<!-- ヘッダー -->
<header class="app-header">
  <h1>⚡ FitLog</h1>
  <div class="today" id="todayLabel"></div>
</header>

<!-- タブナビ -->
<nav class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('running',this)">
    <span class="icon">🏃</span>ランニング
  </button>
  <button class="tab-btn" onclick="switchTab('strength',this)">
    <span class="icon">💪</span>筋トレ
  </button>
  <button class="tab-btn" onclick="switchTab('body',this)">
    <span class="icon">⚖️</span>体重管理
  </button>
  <button class="tab-btn" onclick="switchTab('stats',this)">
    <span class="icon">📊</span>記録・グラフ
  </button>
</nav>

<!-- ══════════ ランニング ══════════ -->
<div id="tab-running" class="tab-panel active">
  <div class="card">
    <div class="card-title">🏃 ランニング記録</div>
    <form id="runForm" onsubmit="addRun(event)">
      <div class="form-grid">
        <div class="form-group full">
          <label>日付</label>
          <input type="date" name="date" required>
        </div>
        <div class="form-group">
          <label>距離 (km)</label>
          <input type="number" name="dist" step="0.01" min="0.01" placeholder="5.00" required oninput="calcPace()">
        </div>
        <div class="form-group">
          <label>ペース（自動計算）</label>
          <div class="auto-display c-g" id="paceDisp">—</div>
        </div>
      </div>
      <div class="form-group" style="margin:10px 0 4px">
        <label>タイム（時間 / 分 / 秒）</label>
        <div class="form-grid col3">
          <input type="number" name="hh" min="0" max="23" placeholder="時間" oninput="calcPace()">
          <input type="number" name="mm" min="0" max="59" placeholder="分" oninput="calcPace()">
          <input type="number" name="ss" min="0" max="59" placeholder="秒" oninput="calcPace()">
        </div>
      </div>
      <div class="form-group" style="margin-top:10px">
        <label>メモ</label>
        <input type="text" name="note" placeholder="コースや体調など">
      </div>
      <button type="submit" class="btn-submit">記録する</button>
    </form>
  </div>

  <div class="card">
    <div class="card-title">最近の記録（最新5件）</div>
    <div id="runList"></div>
  </div>
</div>

<!-- ══════════ 筋トレ ══════════ -->
<div id="tab-strength" class="tab-panel">
  <div class="card">
    <div class="card-title">💪 筋トレ記録</div>
    <form id="strForm" onsubmit="addStr(event)">
      <div class="form-grid">
        <div class="form-group full">
          <label>日付</label>
          <input type="date" name="date" required>
        </div>
        <div class="form-group full">
          <label>種目</label>
          <select name="ex" required onchange="onExChange(this)">
            <option value="">種目を選択</option>
            <optgroup label="胸">
              <option>ベンチプレス</option>
              <option>ダンベルフライ</option>
              <option>腕立て伏せ</option>
              <option>ディップス</option>
            </optgroup>
            <optgroup label="背中">
              <option>デッドリフト</option>
              <option>懸垂（チンアップ）</option>
              <option>ラットプルダウン</option>
              <option>ベントオーバーロウ</option>
            </optgroup>
            <optgroup label="脚">
              <option>スクワット</option>
              <option>レッグプレス</option>
              <option>レッグカール</option>
              <option>カーフレイズ</option>
              <option>ランジ</option>
            </optgroup>
            <optgroup label="肩">
              <option>ショルダープレス</option>
              <option>サイドレイズ</option>
              <option>フロントレイズ</option>
            </optgroup>
            <optgroup label="腕">
              <option>バーベルカール</option>
              <option>ダンベルカール</option>
              <option>トライセプスプレスダウン</option>
            </optgroup>
            <optgroup label="体幹">
              <option>クランチ</option>
              <option>プランク</option>
              <option>レッグレイズ</option>
            </optgroup>
            <option value="__custom">その他（カスタム入力）</option>
          </select>
        </div>
        <div class="form-group full" id="customExWrap" style="display:none">
          <label>種目名（カスタム）</label>
          <input type="text" name="customEx" placeholder="例：ケーブルクロスオーバー">
        </div>
        <div class="form-group">
          <label>重量 (kg)</label>
          <input type="number" name="kg" step="0.5" min="0" placeholder="60" oninput="calcVol()">
        </div>
        <div class="form-group">
          <label>回数 (rep)</label>
          <input type="number" name="reps" min="1" placeholder="10" required oninput="calcVol()">
        </div>
        <div class="form-group">
          <label>セット数</label>
          <input type="number" name="sets" min="1" placeholder="3" required oninput="calcVol()">
        </div>
        <div class="form-group">
          <label>総ボリューム（自動計算）</label>
          <div class="auto-display c-a" id="volDisp">—</div>
        </div>
      </div>
      <div class="form-group" style="margin-top:10px">
        <label>メモ</label>
        <input type="text" name="note" placeholder="コンディションや気づきなど">
      </div>
      <button type="submit" class="btn-submit">記録する</button>
    </form>
  </div>

  <div class="card">
    <div class="card-title">最近の記録（最新5件）</div>
    <div id="strList"></div>
  </div>
</div>

<!-- ══════════ 体重管理 ══════════ -->
<div id="tab-body" class="tab-panel">
  <div class="card">
    <div class="card-title">⚖️ 体重・体脂肪率</div>
    <form id="bodyForm" onsubmit="addBody(event)">
      <div class="form-grid">
        <div class="form-group full">
          <label>日付</label>
          <input type="date" name="date" required>
        </div>
        <div class="form-group">
          <label>体重 (kg)</label>
          <input type="number" name="wt" step="0.1" min="1" placeholder="70.0" required oninput="calcBMI()">
        </div>
        <div class="form-group">
          <label>体脂肪率 (%)</label>
          <input type="number" name="fat" step="0.1" min="0" max="100" placeholder="20.0" oninput="calcBMI()">
        </div>
        <div class="form-group">
          <label>身長 (cm)　※BMI計算用・保存されます</label>
          <input type="number" name="ht" step="0.1" min="1" placeholder="170" id="htInput" oninput="saveHt();calcBMI()">
        </div>
        <div class="form-group">
          <label>BMI（自動計算）</label>
          <div class="auto-display c-b" id="bmiDisp">—</div>
        </div>
      </div>
      <div class="form-group" style="margin-top:10px">
        <label>メモ</label>
        <input type="text" name="note" placeholder="体調など">
      </div>
      <button type="submit" class="btn-submit">記録する</button>
    </form>
  </div>

  <div class="card">
    <div class="card-title">現在の状態</div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-val c-b" id="curWt">—</div><div class="stat-lbl">体重 (kg)</div></div>
      <div class="stat-box"><div class="stat-val c-p" id="curFat">—</div><div class="stat-lbl">体脂肪率 (%)</div></div>
      <div class="stat-box"><div class="stat-val c-g" id="curBMI">—</div><div class="stat-lbl">BMI</div></div>
    </div>
    <div class="card-title">最近の記録（最新5件）</div>
    <div id="bodyList"></div>
  </div>
</div>

<!-- ══════════ 記録・グラフ ══════════ -->
<div id="tab-stats" class="tab-panel">

  <!-- サマリー -->
  <div class="card">
    <div class="card-title">サマリー</div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-val c-g" id="sumDist">0</div><div class="stat-lbl">総距離 (km)</div></div>
      <div class="stat-box"><div class="stat-val c-a" id="sumStr">0</div><div class="stat-lbl">筋トレ回数</div></div>
      <div class="stat-box"><div class="stat-val c-b" id="sumWtChg">—</div><div class="stat-lbl">体重変化 (kg)</div></div>
    </div>
  </div>

  <!-- サブタブ -->
  <div class="sub-nav">
    <button class="sub-btn active" onclick="switchSub('sRun',this)">🏃 ランニング</button>
    <button class="sub-btn" onclick="switchSub('sStr',this)">💪 筋トレ</button>
    <button class="sub-btn" onclick="switchSub('sBody',this)">⚖️ 体重管理</button>
  </div>

  <!-- ランニングサブ -->
  <div id="sub-sRun" class="sub-panel active">
    <div class="card">
      <div class="card-title">ランニング距離の推移</div>
      <div class="chart-wrap"><canvas id="cRun"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">ペースの推移</div>
      <div class="chart-wrap"><canvas id="cPace"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">ランニング記録一覧</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>日付</th><th>距離</th><th>タイム</th><th>ペース</th><th>メモ</th><th></th></tr></thead>
          <tbody id="tRun"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 筋トレサブ -->
  <div id="sub-sStr" class="sub-panel">
    <div class="card">
      <div class="card-title">種目フィルター</div>
      <select id="exFilter" onchange="renderStrChart()" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:0.88rem;width:100%">
        <option value="">全種目</option>
      </select>
    </div>
    <div class="card">
      <div class="card-title">ボリューム推移</div>
      <div class="chart-wrap"><canvas id="cStr"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">筋トレ記録一覧</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>日付</th><th>種目</th><th>重量</th><th>回数</th><th>セット</th><th>ボリューム</th><th>メモ</th><th></th></tr></thead>
          <tbody id="tStr"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- 体重サブ -->
  <div id="sub-sBody" class="sub-panel">
    <div class="card">
      <div class="card-title">体重の推移</div>
      <div class="chart-wrap"><canvas id="cWt"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">体脂肪率の推移</div>
      <div class="chart-wrap"><canvas id="cFat"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">体重管理記録一覧</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>日付</th><th>体重</th><th>体脂肪率</th><th>BMI</th><th>メモ</th><th></th></tr></thead>
          <tbody id="tBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════ CHART DEFAULTS ══════════
Chart.defaults.color = '#64748b';
Chart.defaults.borderColor = '#2a2b3d';
Chart.defaults.font.family = "'Segoe UI', system-ui, sans-serif";
const CI = {}; // chart instances

// ══════════ DATA ══════════
function D() {
  return JSON.parse(localStorage.getItem('fitlog') ||
    '{"run":[],"str":[],"body":[]}');
}
function S(d) { localStorage.setItem('fitlog', JSON.stringify(d)); }

// ══════════ UTILS ══════════
function toToday() {
  return new Date().toLocaleDateString('sv');
}
function fmtDate(s) { return s.replace(/-/g, '/'); }
function toSec(h, m, s) {
  return (parseInt(h)||0)*3600 + (parseInt(m)||0)*60 + (parseInt(s)||0);
}
function paceStr(sec) {
  const m = Math.floor(sec / 60);
  const s = Math.round(sec % 60);
  return `${m}:${String(s).padStart(2,'0')}`;
}
function bmiCat(v) {
  if (v < 18.5) return '低体重';
  if (v < 25)   return '標準';
  if (v < 30)   return '過体重';
  return '肥満';
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}
function emptyHTML(icon, msg) {
  return `<div class="empty"><div class="ei">${icon}</div><p>${msg}</p></div>`;
}

// ══════════ TABS ══════════
function switchTab(id, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  if (id === 'stats') { renderSummary(); renderAllCharts(); }
}

function switchSub(id, btn) {
  document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('sub-' + id).classList.add('active');
  setTimeout(() => {
    if (id === 'sRun')  { renderRunChart(); renderPaceChart(); }
    if (id === 'sStr')  { renderStrChart(); }
    if (id === 'sBody') { renderWtChart(); renderFatChart(); }
  }, 30);
}

// ══════════ RUNNING ══════════
function calcPace() {
  const f = document.getElementById('runForm');
  const dist = parseFloat(f.dist.value) || 0;
  const sec  = toSec(f.hh.value, f.mm.value, f.ss.value);
  const el = document.getElementById('paceDisp');
  if (dist > 0 && sec > 0) {
    el.textContent = paceStr(sec / dist) + ' /km';
  } else {
    el.textContent = '—';
  }
}

function addRun(e) {
  e.preventDefault();
  const f = e.target;
  const dist = parseFloat(f.dist.value);
  const sec  = toSec(f.hh.value, f.mm.value, f.ss.value);
  const pMin = (dist > 0 && sec > 0) ? sec / dist / 60 : null;
  const d = D();
  d.run.unshift({
    id: Date.now(),
    date: f.date.value,
    dist,
    time: `${String(parseInt(f.hh.value)||0).padStart(2,'0')}:${String(parseInt(f.mm.value)||0).padStart(2,'0')}:${String(parseInt(f.ss.value)||0).padStart(2,'0')}`,
    sec,
    pMin,
    pace: pMin ? paceStr(pMin * 60) + ' /km' : '—',
    note: f.note.value
  });
  S(d);
  f.reset(); f.date.value = toToday();
  document.getElementById('paceDisp').textContent = '—';
  renderRunList();
  toast('ランニングを記録しました ✓');
}

function delRun(id) {
  if (!confirm('この記録を削除しますか？')) return;
  const d = D(); d.run = d.run.filter(r => r.id !== id); S(d);
  renderRunList(); toast('削除しました');
}

function renderRunList() {
  const recs = D().run.slice(0, 5);
  const el = document.getElementById('runList');
  if (!recs.length) { el.innerHTML = emptyHTML('🏃','まだ記録がありません'); return; }
  el.innerHTML = '<div class="record-list">' + recs.map(r => `
    <div class="rec">
      <div style="flex:1;min-width:0">
        <div class="rec-date">${fmtDate(r.date)}</div>
        <div class="rec-main c-g">${r.dist} km</div>
        <div class="rec-sub">${r.time} &nbsp;|&nbsp; <span class="badge bg-g">ペース ${r.pace}</span></div>
        ${r.note ? `<div class="rec-sub" style="margin-top:3px">${r.note}</div>` : ''}
      </div>
      <button class="btn-del" onclick="delRun(${r.id})">削除</button>
    </div>`).join('') + '</div>';
}

// ══════════ STRENGTH ══════════
function onExChange(sel) {
  document.getElementById('customExWrap').style.display =
    sel.value === '__custom' ? 'block' : 'none';
  calcVol();
}

function calcVol() {
  const f = document.getElementById('strForm');
  const kg   = parseFloat(f.kg.value)   || 0;
  const reps = parseInt(f.reps.value)   || 0;
  const sets = parseInt(f.sets.value)   || 0;
  const vol = kg * reps * sets;
  document.getElementById('volDisp').textContent = vol > 0
    ? vol.toLocaleString() + ' kg' : '—';
}

function addStr(e) {
  e.preventDefault();
  const f = e.target;
  let ex = f.ex.value;
  if (ex === '__custom') ex = f.customEx.value.trim() || 'カスタム';
  const kg   = parseFloat(f.kg.value)   || 0;
  const reps = parseInt(f.reps.value);
  const sets = parseInt(f.sets.value);
  const d = D();
  d.str.unshift({
    id: Date.now(),
    date: f.date.value,
    ex, kg, reps, sets,
    vol: kg * reps * sets,
    note: f.note.value
  });
  S(d);
  f.reset(); f.date.value = toToday();
  document.getElementById('volDisp').textContent = '—';
  document.getElementById('customExWrap').style.display = 'none';
  renderStrList();
  toast('筋トレを記録しました ✓');
}

function delStr(id) {
  if (!confirm('この記録を削除しますか？')) return;
  const d = D(); d.str = d.str.filter(r => r.id !== id); S(d);
  renderStrList(); toast('削除しました');
}

function renderStrList() {
  const recs = D().str.slice(0, 5);
  const el = document.getElementById('strList');
  if (!recs.length) { el.innerHTML = emptyHTML('💪','まだ記録がありません'); return; }
  el.innerHTML = '<div class="record-list">' + recs.map(r => `
    <div class="rec">
      <div style="flex:1;min-width:0">
        <div class="rec-date">${fmtDate(r.date)}</div>
        <div class="rec-main c-a">${r.ex}</div>
        <div class="rec-sub">
          ${r.kg > 0 ? r.kg + 'kg &nbsp;×&nbsp; ' : ''}${r.reps}回 &nbsp;×&nbsp; ${r.sets}セット
          ${r.vol > 0 ? '&nbsp;|&nbsp; <span class="badge bg-a">Vol: ' + r.vol.toLocaleString() + 'kg</span>' : ''}
        </div>
        ${r.note ? `<div class="rec-sub" style="margin-top:3px">${r.note}</div>` : ''}
      </div>
      <button class="btn-del" onclick="delStr(${r.id})">削除</button>
    </div>`).join('') + '</div>';
}

// ══════════ BODY ══════════
function saveHt() {
  const v = document.getElementById('htInput').value;
  if (v) localStorage.setItem('fitHt', v);
}
function calcBMI() {
  const f = document.getElementById('bodyForm');
  const wt = parseFloat(f.wt.value) || 0;
  const ht = parseFloat(f.ht.value) || 0;
  const el = document.getElementById('bmiDisp');
  if (wt > 0 && ht > 0) {
    const bmi = wt / Math.pow(ht / 100, 2);
    el.textContent = bmi.toFixed(1) + '  (' + bmiCat(bmi) + ')';
  } else { el.textContent = '—'; }
}

function addBody(e) {
  e.preventDefault();
  const f = e.target;
  const wt  = parseFloat(f.wt.value);
  const fat  = f.fat.value ? parseFloat(f.fat.value) : null;
  const ht   = parseFloat(f.ht.value) || parseFloat(localStorage.getItem('fitHt')) || null;
  const bmi  = (wt && ht) ? parseFloat((wt / Math.pow(ht/100,2)).toFixed(1)) : null;
  const d = D();
  d.body.unshift({ id: Date.now(), date: f.date.value, wt, fat, ht, bmi, note: f.note.value });
  S(d);
  f.reset(); f.date.value = toToday();
  const savedHt = localStorage.getItem('fitHt');
  if (savedHt) document.getElementById('htInput').value = savedHt;
  document.getElementById('bmiDisp').textContent = '—';
  renderBodyList(); renderBodyCurrent();
  toast('体重を記録しました ✓');
}

function delBody(id) {
  if (!confirm('この記録を削除しますか？')) return;
  const d = D(); d.body = d.body.filter(r => r.id !== id); S(d);
  renderBodyList(); renderBodyCurrent(); toast('削除しました');
}

function renderBodyCurrent() {
  const r = D().body[0];
  document.getElementById('curWt').textContent  = r ? r.wt : '—';
  document.getElementById('curFat').textContent = r?.fat != null ? r.fat + '%' : '—';
  document.getElementById('curBMI').textContent  = r?.bmi != null ? r.bmi : '—';
}

function renderBodyList() {
  const recs = D().body.slice(0, 5);
  const el = document.getElementById('bodyList');
  if (!recs.length) { el.innerHTML = emptyHTML('⚖️','まだ記録がありません'); return; }
  el.innerHTML = '<div class="record-list">' + recs.map(r => `
    <div class="rec">
      <div style="flex:1;min-width:0">
        <div class="rec-date">${fmtDate(r.date)}</div>
        <div class="rec-main c-b">${r.wt} kg</div>
        <div class="rec-sub">
          ${r.fat != null ? '体脂肪率: ' + r.fat + '% &nbsp;|&nbsp; ' : ''}
          ${r.bmi != null ? '<span class="badge bg-b">BMI: ' + r.bmi + '</span>' : ''}
        </div>
        ${r.note ? `<div class="rec-sub" style="margin-top:3px">${r.note}</div>` : ''}
      </div>
      <button class="btn-del" onclick="delBody(${r.id})">削除</button>
    </div>`).join('') + '</div>';
}

// ══════════ STATS / CHARTS ══════════
function renderSummary() {
  const d = D();
  const dist = d.run.reduce((s, r) => s + r.dist, 0);
  document.getElementById('sumDist').textContent = dist.toFixed(1);
  document.getElementById('sumStr').textContent  = d.str.length;

  const wb = d.body;
  if (wb.length >= 2) {
    const diff = wb[0].wt - wb[wb.length - 1].wt;
    const el = document.getElementById('sumWtChg');
    el.textContent = (diff > 0 ? '+' : '') + diff.toFixed(1);
    el.style.color = diff < 0 ? 'var(--green)' : diff > 0 ? 'var(--red)' : 'var(--text)';
  }

  // populate exercise filter
  const exs = [...new Set(d.str.map(r => r.ex))];
  const sel = document.getElementById('exFilter');
  sel.innerHTML = '<option value="">全種目</option>' +
    exs.map(e => `<option>${e}</option>`).join('');

  // render tables
  renderRunTable(); renderStrTable(); renderBodyTable();
}

function renderAllCharts() {
  // only render the currently visible sub-panel
  if (document.getElementById('sub-sRun').classList.contains('active')) {
    renderRunChart(); renderPaceChart();
  } else if (document.getElementById('sub-sStr').classList.contains('active')) {
    renderStrChart();
  } else if (document.getElementById('sub-sBody').classList.contains('active')) {
    renderWtChart(); renderFatChart();
  }
}

function mkChart(id, labels, datasets, yLabel, fmtY) {
  const canvas = document.getElementById(id);
  if (!canvas) return;
  if (CI[id]) CI[id].destroy();
  CI[id] = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: datasets.length > 1 },
        tooltip: {
          callbacks: fmtY ? { label: ctx => fmtY(ctx.parsed.y) } : {}
        }
      },
      scales: {
        x: { grid: { color: '#1a1b26' }, ticks: { maxTicksLimit: 7, font: { size: 10 } } },
        y: {
          grid: { color: '#1a1b26' },
          title: { display: !!yLabel, text: yLabel, font: { size: 10 } },
          ticks: { font: { size: 10 } }
        }
      },
      elements: {
        point: { radius: 3, hoverRadius: 5 },
        line: { tension: 0.35 }
      }
    }
  });
}

function renderRunChart() {
  const rows = [...D().run].sort((a,b) => a.date.localeCompare(b.date)).slice(-40);
  if (!rows.length) return;
  mkChart('cRun',
    rows.map(r => fmtDate(r.date)),
    [{ label:'距離 (km)', data: rows.map(r => r.dist),
       borderColor:'#10b981', backgroundColor:'rgba(16,185,129,.1)', fill:true }],
    'km', v => v + ' km');
}

function renderPaceChart() {
  const rows = [...D().run].filter(r => r.pMin).sort((a,b) => a.date.localeCompare(b.date)).slice(-40);
  if (!rows.length) return;
  mkChart('cPace',
    rows.map(r => fmtDate(r.date)),
    [{ label:'ペース', data: rows.map(r => r.pMin),
       borderColor:'#818cf8', backgroundColor:'rgba(129,140,248,.1)', fill:true }],
    'min/km', v => paceStr(v*60) + ' /km');
}

function renderStrChart() {
  const filter = document.getElementById('exFilter')?.value || '';
  let rows = D().str;
  if (filter) rows = rows.filter(r => r.ex === filter);
  rows = [...rows].sort((a,b) => a.date.localeCompare(b.date)).slice(-40);
  if (!rows.length) return;
  mkChart('cStr',
    rows.map(r => fmtDate(r.date)),
    [{ label: 'ボリューム' + (filter ? ` (${filter})` : ''),
       data: rows.map(r => r.vol || 0),
       borderColor:'#f59e0b', backgroundColor:'rgba(245,158,11,.1)', fill:true }],
    'kg', v => v.toLocaleString() + ' kg');
}

function renderWtChart() {
  const rows = [...D().body].sort((a,b) => a.date.localeCompare(b.date)).slice(-60);
  if (!rows.length) return;
  mkChart('cWt',
    rows.map(r => fmtDate(r.date)),
    [{ label:'体重 (kg)', data: rows.map(r => r.wt),
       borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,.1)', fill:true }],
    'kg', v => v + ' kg');
}

function renderFatChart() {
  const rows = [...D().body].filter(r => r.fat != null)
    .sort((a,b) => a.date.localeCompare(b.date)).slice(-60);
  if (!rows.length) return;
  mkChart('cFat',
    rows.map(r => fmtDate(r.date)),
    [{ label:'体脂肪率 (%)', data: rows.map(r => r.fat),
       borderColor:'#ec4899', backgroundColor:'rgba(236,72,153,.1)', fill:true }],
    '%', v => v + '%');
}

// ══════════ TABLES ══════════
function tRow(cells) {
  return '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
}
function emptyRow(cols, msg) {
  return `<tr><td colspan="${cols}" style="text-align:center;color:var(--muted);padding:20px">${msg}</td></tr>`;
}

function renderRunTable() {
  const rows = D().run;
  const el = document.getElementById('tRun');
  if (!rows.length) { el.innerHTML = emptyRow(6,'記録がありません'); return; }
  el.innerHTML = rows.map(r => tRow([
    fmtDate(r.date),
    `<strong class="c-g">${r.dist} km</strong>`,
    r.time, r.pace, r.note || '—',
    `<button class="btn-del" onclick="delRun(${r.id});renderSummary();renderAllCharts()">削除</button>`
  ])).join('');
}

function renderStrTable() {
  const rows = D().str;
  const el = document.getElementById('tStr');
  if (!rows.length) { el.innerHTML = emptyRow(8,'記録がありません'); return; }
  el.innerHTML = rows.map(r => tRow([
    fmtDate(r.date),
    `<strong class="c-a">${r.ex}</strong>`,
    r.kg > 0 ? r.kg + ' kg' : '—',
    r.reps + ' 回', r.sets + ' セット',
    r.vol > 0 ? r.vol.toLocaleString() + ' kg' : '—',
    r.note || '—',
    `<button class="btn-del" onclick="delStr(${r.id});renderSummary();renderAllCharts()">削除</button>`
  ])).join('');
}

function renderBodyTable() {
  const rows = D().body;
  const el = document.getElementById('tBody');
  if (!rows.length) { el.innerHTML = emptyRow(6,'記録がありません'); return; }
  el.innerHTML = rows.map(r => tRow([
    fmtDate(r.date),
    `<strong class="c-b">${r.wt} kg</strong>`,
    r.fat != null ? r.fat + '%' : '—',
    r.bmi != null ? r.bmi : '—',
    r.note || '—',
    `<button class="btn-del" onclick="delBody(${r.id});renderSummary();renderAllCharts()">削除</button>`
  ])).join('');
}

// ══════════ INIT ══════════
document.addEventListener('DOMContentLoaded', () => {
  // 今日の日付ラベル
  document.getElementById('todayLabel').textContent =
    new Date().toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'short' });

  // 全フォームの日付を今日に設定
  document.querySelectorAll('input[type="date"]').forEach(el => el.value = toToday());

  // 身長を復元
  const ht = localStorage.getItem('fitHt');
  if (ht) document.getElementById('htInput').value = ht;

  // 初期描画
  renderRunList();
  renderStrList();
  renderBodyList();
  renderBodyCurrent();
});
</script>
